- name: variable perference
  hosts: localhost
  vars:
    WISHES: "Morning from PLAY variable"
  vars_files:
  - vars.yaml
  vars_prompt:
  - name: WISHES
    prompt: Please enter WISHES
    private: false
  tasks:
  - name: check perference
    vars:
      WISHES: "Morning from task variable"
    ansible.builtin.debug:
      msg: "Hello, Good {{WISHES}}"

